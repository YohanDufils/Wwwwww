<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8">
    <title>WWWWWW</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
      /* ===== Scène unique (les deux phases) ===== */
      #scene {
        position: absolute; inset: 0; z-index: 25;
        display: flex; flex-direction: column;
        align-items: center; justify-content: flex-end;
        padding-bottom: 15vh;
        color: #fff; text-align: center;
        pointer-events: none;
      }

      /* Titre WWWWWW — anime position et taille */
      #titre-w {
        font-family: 'Courier New', monospace;
        font-size: min(18vw, 16vh);
        letter-spacing: min(2vw, 20px);
        color: #0ff;
        text-shadow: 0 0 20px #0ff, 0 0 40px #08f, 0 0 80px #04f;
        animation: pulse 2s ease-in-out infinite;
        transition: font-size 0.8s ease, margin-bottom 0.8s ease;
        margin-bottom: 0;
      }
      #titre-w.menu-pos {
        font-size: min(10vw, 8vh);
        margin-bottom: 0.5vh;
      }

      /* Sous-titre — anime position */
      #sous-titre {
        font-family: 'Courier New', monospace;
        font-size: min(2.2vw, 2.5vh);
        color: #8ff;
        text-shadow: 0 0 6px rgba(0,255,255,0.4);
        animation: blink 1.8s ease-in-out infinite;
        transition: font-size 0.8s ease, margin-bottom 0.8s ease;
        margin-bottom: 1vh;
        min-height: 1.4em;
        order: -1;
      }
      #sous-titre.menu-pos {
        font-size: min(1.8vw, 2vh);
        margin-bottom: 2vh;
        order: 1;
        animation: none;
      }

      /* Parallaxe sobre (étoiles) */
      #stars-bg { position: absolute; inset: 0; z-index: 10; }

      /* Canvas de jeu (caché par défaut) */
      #game { display: none; position: absolute; inset: 0; z-index: 30; }
      #game.visible { display: block; }

      /* Zone de contenu central (RAM ou Jukebox) */
      #contenu-central {
        width: min(90vw, 1100px);
        min-height: 30vh;
        display: flex;
        align-items: center;
        justify-content: center;
        order: 2;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.8s ease 0.4s;
      }
      #contenu-central.visible { opacity: 1; pointer-events: auto; }

      #ram-canvas { display: block; max-width: 100%; cursor: pointer; }

      #jukebox-wrap { display: none; width: 100%; }
      #jukebox-wrap.visible { display: block; }
      #jukebox-host {
        position: relative; inset: auto; z-index: auto;
        padding: 0; width: min(96vw, 1200px);
      }

      /* Commandes */
      #commandes {
        order: 3;
        margin-top: 1.5vh;
        color: #f0f;
        font-family: 'Courier New', monospace;
        font-size: min(1.6vw, 1.8vh);
        text-shadow: 0 0 6px #f0f;
        line-height: 2.2;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.8s ease 0.6s;
      }
      #commandes.visible { opacity: 1; pointer-events: auto; }

      #credits {
        order: 4;
        margin-top: 3vh;
        font-family: 'Courier New', monospace;
        font-size: min(1vw, 1.2vh);
        color: rgba(255,255,255,0.2);
        opacity: 0;
        transition: opacity 0.8s ease 0.8s;
      }
      #credits.visible { opacity: 1; }
    </style>
  </head>
  <body>
    <!-- Parallaxe sobre (étoiles, phase 1) -->
    <canvas id="stars-bg"></canvas>

    <!-- Canvas vortex (phase 2, masqué au départ) -->
    <canvas id="title-bg" style="display:none"></canvas>

    <!-- Canvas de jeu (SPA : même page) -->
    <canvas id="game"></canvas>

    <!-- Scène : intro + menu -->
    <div id="scene">
      <div id="sous-titre">Appuyez sur ESPACE pour entrer dans</div>
      <div id="titre-w">WWWWWW</div>
      <div id="contenu-central">
        <canvas id="ram-canvas"></canvas>
        <div id="jukebox-wrap">
          <div id="jukebox-host"></div>
        </div>
      </div>
      <div id="commandes">
        <strong>◀ ▶</strong> ou <strong>Q / D</strong> : Sélectionner un monde<br>
        <strong>ESPACE</strong> : Lancer le monde<br>
        <strong>▲ ▼</strong> ou <strong>ESPACE</strong> : Inverser la gravité (en jeu)<br>
        <strong>R</strong> : Recommencer (en jeu)<br>
        <strong>ÉCHAP</strong> : Retourner à l'accueil<br>
        <strong>J</strong> : Jukebox
      </div>
      <div id="credits">Application cr&eacute;&eacute;e en 2026 par Yohan Dufils, assist&eacute; par Claude Code</div>
    </div>

    <!-- Overlay pour les transitions CRT -->
    <canvas id="crt-overlay" style="display:none; position:absolute; inset:0; z-index:50;"></canvas>

    <!-- Registre global des salles (rempli dynamiquement par chargerSalles) -->
    <script>var SALLES = [];</script>

    <!-- Scripts : vortex, jukebox, mondes, moteur -->
    <script src="scripts/title-vortex.js"></script>
    <script src="scripts/jukebox.js"></script>
    <script src="scripts/mondes.js"></script>
    <script src="scripts/engine.js"></script>

    <script>
    (function() {
      'use strict';

      // ===== État =====
      let phase = 1;           // 1 = intro, 2 = menu, 3 = jeu
      let jukeboxAffiche = false;
      let mondeSelectionne = 0;
      let progression = parseInt(localStorage.getItem('wwwwww_progression') || '1');

      // Premier monde disponible
      for (let i = 0; i < MONDES.length; i++) {
        if (i + 1 <= progression && MONDES[i].salles.length > 0) {
          mondeSelectionne = i; break;
        }
      }

      // ===== Références DOM =====
      const sceneEl    = document.getElementById('scene');
      const titreW     = document.getElementById('titre-w');
      const sousTitre  = document.getElementById('sous-titre');
      const contenuEl  = document.getElementById('contenu-central');
      const cmdEl      = document.getElementById('commandes');
      const ramCanvas  = document.getElementById('ram-canvas');
      const ramCtx     = ramCanvas.getContext('2d');
      const jbWrap     = document.getElementById('jukebox-wrap');
      const gameCanvas = document.getElementById('game');
      const starsCvs   = document.getElementById('stars-bg');
      const starsCtx   = starsCvs.getContext('2d');

      // ===== Parallaxe sobre (champ d'étoiles) =====
      let etoiles = [];
      let starsRunning = true;

      function initEtoiles() {
        const w = starsCvs.width = innerWidth;
        const h = starsCvs.height = innerHeight;
        etoiles = [];
        const nb = Math.floor(w * h / 3000);
        for (let i = 0; i < nb; i++) {
          etoiles.push({
            x: Math.random() * w, y: Math.random() * h,
            r: 0.3 + Math.random() * 1.5,
            speed: 0.1 + Math.random() * 0.4,
            alpha: 0.2 + Math.random() * 0.6,
            twinkle: Math.random() * Math.PI * 2
          });
        }
      }

      function drawEtoiles() {
        if (!starsRunning) return;
        const w = starsCvs.width, h = starsCvs.height;
        starsCtx.fillStyle = '#050510';
        starsCtx.fillRect(0, 0, w, h);
        const t = performance.now() * 0.001;
        for (const e of etoiles) {
          e.y += e.speed;
          if (e.y > h) { e.y = -2; e.x = Math.random() * w; }
          const flicker = 0.5 + 0.5 * Math.sin(t * 1.5 + e.twinkle);
          starsCtx.fillStyle = `rgba(200,220,255,${e.alpha * flicker})`;
          starsCtx.beginPath();
          starsCtx.arc(e.x, e.y, e.r, 0, Math.PI * 2);
          starsCtx.fill();
        }
        requestAnimationFrame(drawEtoiles);
      }

      addEventListener('resize', () => {
        if (starsRunning) initEtoiles();
        if (phase === 2) dessinerRAM();
      });
      initEtoiles();
      drawEtoiles();

      // ===== Scramble du sous-titre =====
      const TEXTE_INTRO = 'Appuyez sur ESPACE pour entrer dans';
      const TEXTE_MENU  = 'Sélectionnez un monde puis appuyez sur ESPACE';
      const SCRAMBLE_CHARS = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%&*<>{}[]|/\\=+-~^';

      function scrambleTransition(de, vers, dureeMs, callback) {
        const longueurMax = Math.max(de.length, vers.length);
        const debut = performance.now();
        function frame() {
          const elapsed = performance.now() - debut;
          const prog = Math.min(1, elapsed / dureeMs);
          let texte = '';
          for (let i = 0; i < longueurMax; i++) {
            const seuil = (i / longueurMax) * 0.7;
            const charProg = Math.max(0, (prog - seuil) / (1 - seuil));
            if (charProg >= 1) {
              texte += i < vers.length ? vers[i] : '';
            } else if (charProg > 0) {
              texte += SCRAMBLE_CHARS[Math.floor(Math.random() * SCRAMBLE_CHARS.length)];
            } else {
              texte += i < de.length ? de[i] : ' ';
            }
          }
          sousTitre.textContent = texte;
          if (prog < 1) requestAnimationFrame(frame);
          else { sousTitre.textContent = vers; if (callback) callback(); }
        }
        requestAnimationFrame(frame);
      }

      // ===== Dessin de la barrette RAM — style néon bleu WWWWWW =====

      const RAM_W = 1000;
      const RAM_H = 360;
      const ACCENTS = ['#0ff','#f0f','#0f0','#ff0','#f44','#88f','#f80','#4fa'];

      // Géométrie
      const MARGE_X = 50;
      const PUCE_W  = 84;
      const PUCE_H  = 64;
      const PUCE_GAP = (RAM_W - MARGE_X * 2 - PUCE_W * 8) / 7;
      const PUCE_Y  = 90;
      const PATTE_W = 8;
      const PATTE_H = 22;
      const PATTE_ESP = (PUCE_W - PATTE_W * 4) / 5;

      let puceZones = [];

      function dessinerRAM() {
        const dpr = window.devicePixelRatio || 1;
        const dispW = Math.min(innerWidth * 0.88, 1000);
        const dispH = dispW * (RAM_H / RAM_W);
        ramCanvas.style.width = dispW + 'px';
        ramCanvas.style.height = dispH + 'px';
        ramCanvas.width = RAM_W * dpr;
        ramCanvas.height = RAM_H * dpr;
        ramCtx.setTransform(dpr, 0, 0, dpr, 0, 0);

        const ctx = ramCtx;
        const t = performance.now() * 0.001;
        puceZones = [];
        ctx.clearRect(0, 0, RAM_W, RAM_H);

        // --- PCB : fond bleu foncé avec circuit imprimé néon ---
        const pcbY = 28;
        const pcbH = 240;

        // Fond bleu foncé
        ctx.shadowColor = '#06f';
        ctx.shadowBlur = 10;
        ctx.fillStyle = 'rgba(4,8,32,0.5)';
        ctx.strokeStyle = '#1a5fff';
        ctx.lineWidth = 2;
        roundRect(ctx, 10, pcbY, RAM_W - 20, pcbH, 8);
        ctx.fill(); ctx.stroke();
        ctx.shadowBlur = 0;

        // --- Circuit imprimé : pistes néon bleu dessinées en JS ---
        ctx.save();
        ctx.beginPath();
        roundRect(ctx, 10, pcbY, RAM_W - 20, pcbH, 8);
        ctx.clip();

        ctx.lineWidth = 1;
        ctx.lineCap = 'round';

        // Pistes horizontales principales
        for (let i = 0; i < 16; i++) {
          const ly = pcbY + 12 + i * 15;
          const hue = (200 + i * 5) % 260;
          ctx.strokeStyle = `hsla(${hue},100%,50%,0.07)`;
          ctx.beginPath();
          ctx.moveTo(15, ly);
          ctx.lineTo(RAM_W - 15, ly);
          ctx.stroke();
        }

        // Pistes de circuit : segments orthogonaux + diagonales
        const rng = mulberry32(42);
        for (let trace = 0; trace < 25; trace++) {
          const sx = 30 + rng() * (RAM_W - 60);
          const sy = pcbY + 10 + rng() * (pcbH - 20);
          const nbSegs = 3 + Math.floor(rng() * 5);
          let cx = sx, cy = sy;

          const hue = 200 + rng() * 40;
          const alpha = 0.05 + rng() * 0.08;
          ctx.strokeStyle = `hsla(${hue},100%,55%,${alpha})`;
          ctx.lineWidth = 0.5 + rng() * 1;
          ctx.beginPath();
          ctx.moveTo(cx, cy);

          for (let s = 0; s < nbSegs; s++) {
            const dir = rng();
            const len = 20 + rng() * 80;
            if (dir < 0.35) { cx += len; }
            else if (dir < 0.6) { cy += (rng() > 0.5 ? 1 : -1) * len * 0.5; }
            else if (dir < 0.8) { cx += len * 0.7; cy += (rng() > 0.5 ? 1 : -1) * len * 0.3; }
            else { cx -= len * 0.5; }
            cx = Math.max(15, Math.min(RAM_W - 15, cx));
            cy = Math.max(pcbY + 5, Math.min(pcbY + pcbH - 5, cy));
            ctx.lineTo(cx, cy);
          }
          ctx.stroke();

          // Petits pads aux extrémités
          ctx.fillStyle = `hsla(${hue},100%,55%,${alpha * 1.5})`;
          ctx.fillRect(sx - 2, sy - 2, 4, 4);
          ctx.fillRect(cx - 2, cy - 2, 4, 4);
        }

        // Vias (petits ronds connecteurs)
        for (let v = 0; v < 30; v++) {
          const vx = 40 + rng() * (RAM_W - 80);
          const vy = pcbY + 15 + rng() * (pcbH - 30);
          ctx.fillStyle = `hsla(220,100%,60%,0.1)`;
          ctx.beginPath();
          ctx.arc(vx, vy, 2, 0, Math.PI * 2);
          ctx.fill();
        }

        ctx.restore();

        // Bordure néon bleu du PCB (par-dessus le clip)
        ctx.strokeStyle = '#1a5fff';
        ctx.lineWidth = 2;
        ctx.shadowColor = '#06f';
        ctx.shadowBlur = 8;
        roundRect(ctx, 10, pcbY, RAM_W - 20, pcbH, 8);
        ctx.stroke();
        ctx.shadowBlur = 0;

        // Encoche centrale
        const notchW = 28, notchH = 12;
        const notchX = RAM_W / 2 - notchW / 2;
        ctx.fillStyle = '#020208';
        ctx.strokeStyle = '#1a5fff';
        ctx.lineWidth = 1;
        ctx.fillRect(notchX, pcbY + pcbH - 1, notchW, notchH);
        ctx.strokeRect(notchX, pcbY + pcbH - 1, notchW, notchH);

        // --- Connecteur RGB arc-en-ciel (lignes de gravité) ---
        const connY = pcbY + pcbH - 8;
        const connH = 30;
        const nbPins = 64;
        const pinW = (RAM_W - 80) / nbPins;

        for (let i = 0; i < nbPins; i++) {
          const px = 40 + i * pinW;

          const hue = ((i / nbPins) * 360 + t * 240) % 360;
          ctx.fillStyle = `hsl(${hue},100%,55%)`;
          ctx.shadowColor = `hsl(${hue},100%,60%)`;
          ctx.shadowBlur = 4;
          ctx.fillRect(px, connY, pinW - 1, connH);
        }
        ctx.shadowBlur = 0;

        // Contour du connecteur RGB (bleu néon)
        ctx.strokeStyle = '#1a5fff';
        ctx.lineWidth = 1.5;
        ctx.shadowColor = '#06f';
        ctx.shadowBlur = 6;
        ctx.strokeRect(38, connY - 1, RAM_W - 76, connH + 2);
        ctx.shadowBlur = 0;

        // Label néon
        ctx.fillStyle = 'rgba(26,95,255,0.2)';
        ctx.font = 'bold 10px "Courier New", monospace';
        ctx.textAlign = 'right';
        ctx.textBaseline = 'top';
        ctx.fillText('WWWWWW-RAM-64', RAM_W - 30, pcbY + 8);

        // --- 8 puces (chipsets = mondes) ---
        for (let m = 0; m < 8; m++) {
          const monde = MONDES[m];
          const num = m + 1;
          const debloque = num <= progression;
          const complet = num < progression;
          const disponible = debloque && monde.salles.length > 0;
          const selectionne = (m === mondeSelectionne) && phase === 2;
          const accent = ACCENTS[m];

          const px = MARGE_X + m * (PUCE_W + PUCE_GAP);
          const py = PUCE_Y;

          puceZones.push({ x: px - 8, y: py - PATTE_H - 4, w: PUCE_W + 16, h: PUCE_H + PATTE_H * 2 + 40, monde: num, disponible });

          // --- Pattes (4 haut + 4 bas = 8 salles) ---
          for (let s = 0; s < 8; s++) {
            const enHaut = s < 4;
            const idx = enHaut ? s : s - 4;
            const patteX = px + PATTE_ESP + idx * (PATTE_W + PATTE_ESP);
            const patteY = enHaut ? py - PATTE_H : py + PUCE_H;

            const couleur = disponible ? accent : (debloque ? '#333' : '#1a1a1a');
            let alpha = disponible ? (0.6 + 0.4 * Math.sin(t * 2.5 + m * 0.9 + s * 0.6)) : 0.35;

            if (disponible) {
              ctx.shadowColor = accent;
              ctx.shadowBlur = selectionne ? 10 : 4;
            }

            ctx.globalAlpha = alpha;
            ctx.fillStyle = couleur;
            roundRect(ctx, patteX, patteY, PATTE_W, PATTE_H, 1);
            ctx.fill();
            ctx.strokeStyle = couleur;
            ctx.lineWidth = 0.8;
            ctx.globalAlpha = alpha * 0.6;
            roundRect(ctx, patteX, patteY, PATTE_W, PATTE_H, 1);
            ctx.stroke();

            ctx.globalAlpha = 1;
            ctx.shadowBlur = 0;
          }

          // --- Corps de la puce ---
          const glowI = selectionne ? (12 + 6 * Math.sin(t * 4)) : (disponible ? 6 : 0);

          if (glowI > 0) { ctx.shadowColor = accent; ctx.shadowBlur = glowI; }

          ctx.fillStyle = selectionne ? 'rgba(10,10,24,0.92)' : 'rgba(6,6,14,0.88)';
          ctx.strokeStyle = disponible ? accent : '#222';
          ctx.lineWidth = selectionne ? 2.5 : (disponible ? 1.5 : 1);
          roundRect(ctx, px, py, PUCE_W, PUCE_H, 5);
          ctx.fill(); ctx.stroke();
          ctx.shadowBlur = 0;

          // Bordure de sélection pulsante
          if (selectionne) {
            const selAlpha = 0.3 + 0.2 * Math.sin(t * 5);
            ctx.strokeStyle = `rgba(255,255,255,${selAlpha})`;
            ctx.lineWidth = 1;
            roundRect(ctx, px - 3, py - 3, PUCE_W + 6, PUCE_H + 6, 7);
            ctx.stroke();
          }

          // Point de repère
          ctx.fillStyle = disponible ? accent : '#222';
          ctx.beginPath(); ctx.arc(px + 11, py + 11, 3.5, 0, Math.PI * 2); ctx.fill();

          // Numéro
          ctx.fillStyle = disponible ? accent : '#444';
          ctx.font = 'bold 18px "Courier New", monospace';
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.fillText(num, px + PUCE_W / 2, py + PUCE_H / 2);

          // Nom du monde
          const nomCourt = monde.nom.replace(/^Monde \d+ — /, '');
          ctx.fillStyle = disponible ? (selectionne ? '#fff' : 'rgba(255,255,255,0.55)') : 'rgba(255,255,255,0.12)';
          ctx.font = '10px "Courier New", monospace';
          ctx.textBaseline = 'top';
          ctx.fillText(nomCourt, px + PUCE_W / 2, py + PUCE_H + PATTE_H + 6);

          // Cadenas néon rouge
          if (!debloque) {
            ctx.fillStyle = 'rgba(255,80,80,0.25)';
            ctx.font = '13px "Courier New", monospace';
            ctx.textBaseline = 'middle';
            ctx.fillText('\u2717', px + PUCE_W / 2, py + PUCE_H / 2 + 14);
          }
        }
      }

      // RNG déterministe pour le circuit imprimé
      function mulberry32(seed) {
        let s = seed | 0;
        return function() {
          s = (s + 0x6D2B79F5) | 0;
          let t = Math.imul(s ^ (s >>> 15), 1 | s);
          t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
          return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
        };
      }

      function roundRect(ctx, x, y, w, h, r) {
        ctx.beginPath();
        ctx.moveTo(x + r, y);
        ctx.lineTo(x + w - r, y);
        ctx.quadraticCurveTo(x + w, y, x + w, y + r);
        ctx.lineTo(x + w, y + h - r);
        ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
        ctx.lineTo(x + r, y + h);
        ctx.quadraticCurveTo(x, y + h, x, y + h - r);
        ctx.lineTo(x, y + r);
        ctx.quadraticCurveTo(x, y, x + r, y);
        ctx.closePath();
      }

      // Clic sur une puce
      ramCanvas.addEventListener('click', function(e) {
        const rect = ramCanvas.getBoundingClientRect();
        const scaleX = RAM_W / rect.width;
        const scaleY = RAM_H / rect.height;
        const mx = (e.clientX - rect.left) * scaleX;
        const my = (e.clientY - rect.top) * scaleY;
        for (const z of puceZones) {
          if (mx >= z.x && mx <= z.x + z.w && my >= z.y && my <= z.y + z.h) {
            if (z.disponible) {
              mondeSelectionne = z.monde - 1;
              lancerMonde(z.monde);
            }
            break;
          }
        }
      });

      ramCanvas.addEventListener('mousemove', function(e) {
        const rect = ramCanvas.getBoundingClientRect();
        const scaleX = RAM_W / rect.width;
        const scaleY = RAM_H / rect.height;
        const mx = (e.clientX - rect.left) * scaleX;
        const my = (e.clientY - rect.top) * scaleY;
        let surPuce = false;
        for (const z of puceZones) {
          if (mx >= z.x && mx <= z.x + z.w && my >= z.y && my <= z.y + z.h && z.disponible) {
            surPuce = true; break;
          }
        }
        ramCanvas.style.cursor = surPuce ? 'pointer' : 'default';
      });

      // Animation RAM
      function animerRAM() {
        if (phase === 2 && !jukeboxAffiche) dessinerRAM();
        requestAnimationFrame(animerRAM);
      }

      // ===== Navigation clavier entre mondes =====
      function selectionnerMonde(direction) {
        let idx = mondeSelectionne;
        for (let tentative = 0; tentative < 8; tentative++) {
          idx = (idx + direction + 8) % 8;
          const num = idx + 1;
          if (num <= progression && MONDES[idx].salles.length > 0) {
            mondeSelectionne = idx;
            return;
          }
        }
      }

      // ===== Chargement dynamique des salles d'un monde =====
      // Les scripts déjà chargés sont tracés pour éviter les doublons
      let scriptsCharges = new Set();

      async function chargerSalles(mondeIdx) {
        const monde = MONDES[mondeIdx];
        // Vider le tableau global SALLES
        window.SALLES = [];
        for (const chemin of monde.salles) {
          const src = 'salles/' + chemin;
          // Toujours recharger car SALLES est vidé
          await new Promise((resolve, reject) => {
            const s = document.createElement('script');
            s.src = src + '?t=' + Date.now(); // Cache-bust pour forcer le re-push
            s.onload = resolve;
            s.onerror = reject;
            document.body.appendChild(s);
          });
        }
      }

      // ===== Transition Phase 1 → Phase 2 =====
      function passerAuMenu() {
        if (phase !== 1) return;
        phase = 2;

        titreW.classList.add('menu-pos');
        sousTitre.classList.add('menu-pos');
        sceneEl.style.justifyContent = 'center';
        sceneEl.style.paddingBottom = '0';
        scrambleTransition(TEXTE_INTRO, TEXTE_MENU, 900, null);

        setTimeout(() => {
          contenuEl.classList.add('visible');
          cmdEl.classList.add('visible');
          document.getElementById('credits').classList.add('visible');
        }, 200);

        if (window.titleVortexStart) window.titleVortexStart();
        setTimeout(() => {
          starsRunning = false;
          starsCvs.style.display = 'none';
        }, 1000);

        if (window.jukeboxPlay && window.jukeboxNbPistes) {
          const nb = window.jukeboxNbPistes();
          window.jukeboxPlay(Math.floor(Math.random() * nb));
        }

        if (window.jukeboxConstruireDOM) {
          window.jukeboxConstruireDOM('jukebox-host');
        }

        dessinerRAM();
        animerRAM();
      }

      // ===== Toggle Jukebox / RAM =====
      function toggleJukebox() {
        if (phase !== 2) return;
        jukeboxAffiche = !jukeboxAffiche;
        if (jukeboxAffiche) {
          ramCanvas.style.display = 'none';
          jbWrap.classList.add('visible');
        } else {
          jbWrap.classList.remove('visible');
          ramCanvas.style.display = 'block';
        }
      }

      // ===== Animation CRT (télé cathodique) =====
      const crtCanvas = document.getElementById('crt-overlay');
      const crtCtx = crtCanvas.getContext('2d');

      /** SFX CRT : synthèse procédurale via Web Audio API */
      function sfxCRT(type) {
        const ac = new (window.AudioContext || window.webkitAudioContext)();
        const t = ac.currentTime;

        if (type === 'off') {
          // Whine descendant (tube cathodique qui s'éteint)
          const o = ac.createOscillator(), g = ac.createGain();
          o.type = 'sine';
          o.frequency.setValueAtTime(4000, t);
          o.frequency.exponentialRampToValueAtTime(60, t + 0.4);
          g.gain.setValueAtTime(0.08, t);
          g.gain.exponentialRampToValueAtTime(0.001, t + 0.45);
          o.connect(g); g.connect(ac.destination);
          o.start(t); o.stop(t + 0.5);

          // Buzz/crépitement électrique
          const o2 = ac.createOscillator(), g2 = ac.createGain();
          o2.type = 'sawtooth';
          o2.frequency.setValueAtTime(120, t);
          o2.frequency.setValueAtTime(60, t + 0.2);
          g2.gain.setValueAtTime(0.04, t);
          g2.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
          o2.connect(g2); g2.connect(ac.destination);
          o2.start(t); o2.stop(t + 0.35);

          // Pop final
          const o3 = ac.createOscillator(), g3 = ac.createGain();
          o3.type = 'sine';
          o3.frequency.setValueAtTime(200, t + 0.3);
          o3.frequency.exponentialRampToValueAtTime(40, t + 0.38);
          g3.gain.setValueAtTime(0.12, t + 0.3);
          g3.gain.exponentialRampToValueAtTime(0.001, t + 0.4);
          o3.connect(g3); g3.connect(ac.destination);
          o3.start(t + 0.3); o3.stop(t + 0.42);

          setTimeout(() => ac.close(), 600);

        } else if (type === 'on') {
          // Bourdonnement électrique montant
          const o = ac.createOscillator(), g = ac.createGain();
          o.type = 'sine';
          o.frequency.setValueAtTime(50, t);
          o.frequency.exponentialRampToValueAtTime(8000, t + 0.25);
          o.frequency.exponentialRampToValueAtTime(3000, t + 0.35);
          g.gain.setValueAtTime(0.001, t);
          g.gain.linearRampToValueAtTime(0.06, t + 0.15);
          g.gain.exponentialRampToValueAtTime(0.001, t + 0.5);
          o.connect(g); g.connect(ac.destination);
          o.start(t); o.stop(t + 0.55);

          // Crépitement statique (bruit simulé)
          for (let i = 0; i < 6; i++) {
            const oN = ac.createOscillator(), gN = ac.createGain();
            oN.type = 'square';
            oN.frequency.value = 200 + Math.random() * 10000;
            const tStart = t + 0.05 + Math.random() * 0.3;
            gN.gain.setValueAtTime(0.015, tStart);
            gN.gain.exponentialRampToValueAtTime(0.001, tStart + 0.04);
            oN.connect(gN); gN.connect(ac.destination);
            oN.start(tStart); oN.stop(tStart + 0.05);
          }

          // Hum de fond (60 Hz, le bourdonnement du tube)
          const oH = ac.createOscillator(), gH = ac.createGain();
          oH.type = 'sine';
          oH.frequency.value = 60;
          gH.gain.setValueAtTime(0.03, t + 0.1);
          gH.gain.exponentialRampToValueAtTime(0.001, t + 0.6);
          oH.connect(gH); gH.connect(ac.destination);
          oH.start(t + 0.1); oH.stop(t + 0.65);

          setTimeout(() => ac.close(), 800);
        }
      }

      /** Animation CRT OFF→ON. Retourne une Promise résolue quand c'est fini.
       *  onNoir : callback appelé au début de la phase noire (pour switcher le contenu sous l'overlay). */
      function animationCRT(onNoir) {
        return new Promise(resolve => {
          const w = crtCanvas.width = innerWidth;
          const h = crtCanvas.height = innerHeight;
          crtCanvas.style.display = 'block';

          const cx = w / 2, cy = h / 2;
          const debut = performance.now();
          let noirAppele = false;

          // Durées (ms)
          const DUR_OFF    = 280;  // Écran se collapse
          const DUR_NOIR   = 245;  // Pause noire
          const DUR_ON     = 315;  // Écran s'allume
          const DUR_TOTAL  = DUR_OFF + DUR_NOIR + DUR_ON;

          sfxCRT('off');
          setTimeout(() => sfxCRT('on'), DUR_OFF + DUR_NOIR - 50);

          function frame() {
            const elapsed = performance.now() - debut;

            if (elapsed < DUR_OFF) {
              // --- PHASE OFF : collapse vertical puis horizontal ---
              const p = elapsed / DUR_OFF;

              // Fond noir
              crtCtx.fillStyle = '#000';
              crtCtx.fillRect(0, 0, w, h);

              if (p < 0.6) {
                // L'image se compresse verticalement → bande horizontale
                const pp = p / 0.6; // 0→1
                const bandH = Math.max(2, h * (1 - pp));
                const bandY = cy - bandH / 2;

                // Bande blanche lumineuse
                crtCtx.fillStyle = `rgba(200,220,255,${0.6 + 0.4 * (1 - pp)})`;
                crtCtx.fillRect(0, bandY, w, bandH);

                // Scanlines dans la bande
                crtCtx.fillStyle = 'rgba(0,0,0,0.15)';
                for (let sy = bandY; sy < bandY + bandH; sy += 3) {
                  crtCtx.fillRect(0, sy, w, 1);
                }

                // Phosphor glow
                const glow = crtCtx.createRadialGradient(cx, cy, 0, cx, cy, bandH);
                glow.addColorStop(0, `rgba(180,200,255,${0.15 * (1 - pp)})`);
                glow.addColorStop(1, 'rgba(0,0,0,0)');
                crtCtx.fillStyle = glow;
                crtCtx.fillRect(0, 0, w, h);

              } else {
                // La bande se compresse horizontalement → point
                const pp = (p - 0.6) / 0.4; // 0→1
                const bandW = Math.max(3, w * (1 - pp));
                const bandX = cx - bandW / 2;
                const dotH = Math.max(2, 4 * (1 - pp * 0.5));

                crtCtx.fillStyle = `rgba(200,220,255,${0.8 * (1 - pp * 0.3)})`;
                crtCtx.fillRect(bandX, cy - dotH / 2, bandW, dotH);

                // Glow autour du point
                const glow = crtCtx.createRadialGradient(cx, cy, 0, cx, cy, 40 * (1 - pp) + 5);
                glow.addColorStop(0, `rgba(180,200,255,${0.3 * (1 - pp)})`);
                glow.addColorStop(1, 'rgba(0,0,0,0)');
                crtCtx.fillStyle = glow;
                crtCtx.fillRect(0, 0, w, h);
              }

            } else if (elapsed < DUR_OFF + DUR_NOIR) {
              // --- PHASE NOIRE : switcher le contenu sous l'overlay ---
              if (!noirAppele) {
                noirAppele = true;
                if (onNoir) onNoir();
              }
              crtCtx.fillStyle = '#000';
              crtCtx.fillRect(0, 0, w, h);

              // Léger point de phosphore résiduel qui s'estompe
              const pp = (elapsed - DUR_OFF) / DUR_NOIR;
              const glow = crtCtx.createRadialGradient(cx, cy, 0, cx, cy, 8);
              glow.addColorStop(0, `rgba(150,170,220,${0.2 * (1 - pp)})`);
              glow.addColorStop(1, 'rgba(0,0,0,0)');
              crtCtx.fillStyle = glow;
              crtCtx.fillRect(cx - 20, cy - 20, 40, 40);

            } else if (elapsed < DUR_TOTAL) {
              // --- PHASE ON : expansion du point → bande → plein écran ---
              const p = (elapsed - DUR_OFF - DUR_NOIR) / DUR_ON;

              crtCtx.fillStyle = '#000';
              crtCtx.fillRect(0, 0, w, h);

              if (p < 0.3) {
                // Point lumineux qui apparaît
                const pp = p / 0.3;
                const r = 3 + pp * 15;
                const glow = crtCtx.createRadialGradient(cx, cy, 0, cx, cy, r);
                glow.addColorStop(0, `rgba(200,220,255,${0.5 * pp})`);
                glow.addColorStop(0.5, `rgba(100,140,255,${0.3 * pp})`);
                glow.addColorStop(1, 'rgba(0,0,0,0)');
                crtCtx.fillStyle = glow;
                crtCtx.fillRect(0, 0, w, h);

              } else if (p < 0.6) {
                // Le point s'étire en bande horizontale
                const pp = (p - 0.3) / 0.3;
                const bandW = 6 + pp * w;
                const bandX = cx - bandW / 2;
                const bandH = 3 + pp * 6;

                crtCtx.fillStyle = `rgba(200,220,255,${0.5 + pp * 0.3})`;
                crtCtx.fillRect(bandX, cy - bandH / 2, bandW, bandH);

                const glow = crtCtx.createRadialGradient(cx, cy, 0, cx, cy, bandW / 2);
                glow.addColorStop(0, `rgba(150,180,255,${0.15 * pp})`);
                glow.addColorStop(1, 'rgba(0,0,0,0)');
                crtCtx.fillStyle = glow;
                crtCtx.fillRect(0, 0, w, h);

              } else {
                // La bande s'étire verticalement → plein écran + bruit
                const pp = (p - 0.6) / 0.4;
                const imgH = Math.min(h, pp * h);
                const imgY = cy - imgH / 2;

                // Effacer tout le canvas (transparent) pour que le contenu en dessous soit visible
                crtCtx.clearRect(0, 0, w, h);

                // Bandes noires en haut et en bas qui se rétractent
                if (imgY > 0) {
                  crtCtx.fillStyle = '#000';
                  crtCtx.fillRect(0, 0, w, imgY);
                  crtCtx.fillRect(0, imgY + imgH, w, h - imgY - imgH);
                }

                // Zone visible : bruit statique + scanlines qui s'estompe
                if (pp < 0.8) {
                  const noiseAlpha = 0.12 * (1 - pp / 0.8);
                  const imgData = crtCtx.createImageData(w, Math.max(1, Math.floor(imgH)));
                  const d = imgData.data;
                  for (let i = 0; i < d.length; i += 4) {
                    const v = Math.random() * 255;
                    d[i] = d[i+1] = d[i+2] = v;
                    d[i+3] = noiseAlpha * 255;
                  }
                  crtCtx.putImageData(imgData, 0, imgY);
                }

                // Scanlines
                if (pp < 0.95) {
                  crtCtx.fillStyle = `rgba(0,0,0,${0.06 * (1 - pp)})`;
                  for (let sy = imgY; sy < imgY + imgH; sy += 3) {
                    crtCtx.fillRect(0, sy, w, 1);
                  }
                }

                // Vignette qui s'estompe
                if (pp < 0.9) {
                  const voileAlpha = 1 - pp;
                  const vig = crtCtx.createRadialGradient(cx, cy, h * 0.3 * pp, cx, cy, h * 0.7);
                  vig.addColorStop(0, 'rgba(0,0,0,0)');
                  vig.addColorStop(1, `rgba(0,0,0,${voileAlpha * 0.5})`);
                  crtCtx.fillStyle = vig;
                  crtCtx.fillRect(0, 0, w, h);
                }
              }

            } else {
              // Terminé — masquer l'overlay (déjà transparent)
              crtCanvas.style.display = 'none';
              resolve();
              return;
            }

            requestAnimationFrame(frame);
          }

          requestAnimationFrame(frame);
        });
      }

      // ===== Retour au menu (réutilisé par ESC et boss vaincu) =====
      function afficherMenu() {
        phase = 2;
        gameCanvas.classList.remove('visible');
        sceneEl.style.display = '';
        document.getElementById('title-bg').style.display = 'block';
        if (window.titleVortexStart) window.titleVortexStart();

        // Relire la progression (elle a pu changer si le boss a été battu)
        progression = parseInt(localStorage.getItem('wwwwww_progression') || '1');

        // Relancer le jukebox
        if (window.jukeboxPlay && window.jukeboxNbPistes) {
          const nb = window.jukeboxNbPistes();
          window.jukeboxPlay(Math.floor(Math.random() * nb));
        }
      }

      // ===== Lancer un monde (SPA) =====
      async function lancerMonde(num) {
        if (phase === 3) return;

        // Arrêter le jukebox
        if (window.jukeboxStop) window.jukeboxStop();

        // Stocker l'index du monde courant
        window.MONDE_COURANT = num - 1;

        // Charger les salles pendant l'animation
        const chargementPromise = chargerSalles(num - 1);

        // Lancer l'animation CRT OFF → ON
        // Pendant la phase noire : switcher menu → jeu
        const animPromise = animationCRT(function() {
          sceneEl.style.display = 'none';
          document.getElementById('title-bg').style.display = 'none';
          if (window.titleVortexStop) window.titleVortexStop();
          gameCanvas.classList.add('visible');
        });

        // Attendre que les salles soient chargées
        await chargementPromise;

        // Démarrer le moteur
        phase = 3;
        // Retour au menu avec animation CRT (utilisé par ESC et boss vaincu)
        async function retourAvecCRT() {
          if (window.arreterJeu) window.arreterJeu(true);
          await animationCRT(afficherMenu);
        }

        window.demarrerJeu(retourAvecCRT, retourAvecCRT);

        // L'animation CRT ON révèle le jeu en dessous
        await animPromise;
      }

      // ===== Clavier =====
      addEventListener('keydown', function(e) {
        // Ignorer en phase jeu (le moteur gère ses propres inputs)
        if (phase === 3) return;

        if (e.code === 'Space') {
          e.preventDefault();
          if (phase === 1) {
            passerAuMenu();
          } else if (phase === 2 && !jukeboxAffiche) {
            const num = mondeSelectionne + 1;
            const m = MONDES[mondeSelectionne];
            if (num <= progression && m && m.salles.length > 0) {
              lancerMonde(num);
            }
          }
          return;
        }

        if (phase === 2) {
          if (e.code === 'ArrowLeft' || e.code === 'KeyQ') {
            selectionnerMonde(-1);
            return;
          }
          if (e.code === 'ArrowRight' || e.code === 'KeyD') {
            selectionnerMonde(1);
            return;
          }
          if (e.code === 'KeyJ') {
            toggleJukebox();
            return;
          }
          const num = parseInt(e.key);
          if (num >= 1 && num <= 8) {
            const m = MONDES[num - 1];
            if (num <= progression && m && m.salles.length > 0) {
              mondeSelectionne = num - 1;
              lancerMonde(num);
            }
          }
        }
      });

    })();
    </script>
