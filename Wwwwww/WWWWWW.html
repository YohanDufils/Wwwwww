<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8">
    <title>WWWWWW</title>
    <link rel="stylesheet" href="css/style.css">
  </head>
  <body>
    <canvas id="game"></canvas>

    <!-- Jukebox -->
    <script src="scripts/jukebox.js"></script>

    <!-- Registre des mondes -->
    <script src="scripts/mondes.js"></script>

    <!-- Chargement dynamique des salles du monde sélectionné -->
    <script>
      const SALLES = [];

      (async function() {
        // Lire le numéro de monde depuis l'URL (?monde=1)
        const params = new URLSearchParams(location.search);
        const mondeIdx = parseInt(params.get('monde') || '1') - 1;
        const monde = MONDES[mondeIdx];

        if (!monde || monde.salles.length === 0) {
          window.location.href = 'index.html';
          return;
        }

        // Stocker l'index du monde courant pour engine.js
        window.MONDE_COURANT = mondeIdx;

        // Charger chaque fichier de salle dans l'ordre
        for (const chemin of monde.salles) {
          await new Promise((resolve, reject) => {
            const s = document.createElement('script');
            s.src = 'salles/' + chemin;
            s.onload = resolve;
            s.onerror = reject;
            document.body.appendChild(s);
          });
        }

        // Charger le moteur une fois toutes les salles prêtes
        const eng = document.createElement('script');
        eng.src = 'scripts/engine.js';
        document.body.appendChild(eng);
      })();
    </script>
  </body>
</html>
